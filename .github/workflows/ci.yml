name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Type-check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint API
        working-directory: apps/api
        run: bun run lint

      - name: Type-check API
        working-directory: apps/api
        run: bunx tsc --noEmit

      - name: Lint Web
        working-directory: apps/web
        run: bun run lint

      - name: Type-check Web
        working-directory: apps/web
        run: bunx tsc --noEmit

  # ─── API Unit Tests ───────────────────────────────────────────────────────
  test-api:
    name: API Tests (Bun)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kget_cloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kget_cloud_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-ci
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Prisma migrations
        working-directory: apps/api
        run: bunx prisma migrate deploy

      - name: Run unit tests
        working-directory: apps/api
        run: bun run test:coverage

  # ─── Web Unit Tests ───────────────────────────────────────────────────────
  test-web:
    name: Web Tests (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run web tests
        working-directory: apps/web
        run: bun run test:coverage

  # ─── Railway Docker Images ────────────────────────────────────────────────
  docker-build:
    name: Railway Docker build
    runs-on: ubuntu-latest
    needs: [lint, test-api, test-web, test-agent]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile .

  # ─── Rust Agent ───────────────────────────────────────────────────────────
  test-agent:
    name: Rust Agent (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent

      - name: Cargo test
        run: cargo test --manifest-path apps/agent/Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path apps/agent/Cargo.toml -- -D warnings

      - name: Cargo fmt check
        run: cargo fmt --manifest-path apps/agent/Cargo.toml -- --check
