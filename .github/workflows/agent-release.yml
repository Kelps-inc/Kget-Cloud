name: Agent Release

on:
  push:
    tags:
      - 'agent-v*'

concurrency:
  group: agent-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: kget-agent-macos-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: kget-agent-macos-x64

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: kget-agent-linux-x64
            use_cross: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: kget-agent-linux-arm64
            use_cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: kget-agent-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent
          key: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }} --manifest-path apps/agent/Cargo.toml

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} --manifest-path apps/agent/Cargo.toml

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp apps/agent/target/${{ matrix.target }}/release/kget-agent ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: cp apps/agent/target/${{ matrix.target }}/release/kget-agent.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/kget-agent-macos-arm64
            dist/kget-agent-macos-x64
            dist/kget-agent-linux-x64
            dist/kget-agent-linux-arm64
            dist/kget-agent-windows-x64.exe
