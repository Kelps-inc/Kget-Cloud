name: CD — Deploy to Railway

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false   # Never cancel an in-flight production deploy

jobs:
  # CI must pass before deploying (reuse the same checks)
  deploy:
    name: Deploy to Railway (production)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations in production
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bunx prisma migrate deploy

      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_SERVICE: ${{ vars.RAILWAY_API_SERVICE || 'api' }}
        run: |
          cp infra/railway/api.railway.json railway.json
          railway up --service "$RAILWAY_API_SERVICE" --detach

      - name: Deploy Web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_WEB_SERVICE: ${{ vars.RAILWAY_WEB_SERVICE || 'web' }}
        run: |
          cp infra/railway/web.railway.json railway.json
          railway up --service "$RAILWAY_WEB_SERVICE" --detach

      - name: Notify deploy status
        if: always()
        run: |
          echo "Deploy finished with status: ${{ job.status }}"
